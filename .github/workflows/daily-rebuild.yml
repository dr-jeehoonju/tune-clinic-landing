name: Daily scheduled rebuild

on:
  schedule:
    - cron: "7 0 * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST Netlify build hook
        run: |
          if [ -z "${{ secrets.NETLIFY_BUILD_HOOK }}" ]; then
            echo "NETLIFY_BUILD_HOOK secret is not set" >&2
            exit 1
          fi
          curl -fsS -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK }}"
          echo "Build hook triggered."
