[build]
  publish = "."
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
    Accept-Ranges = "bytes"

[[redirects]]
  from = "/menu"
  to = "/menu.html"
  status = 200

[[redirects]]
  from = "/gallery"
  to = "/gallery.html"
  status = 200

[[redirects]]
  from = "/guides"
  to = "/guides.html"
  status = 200

[[redirects]]
  from = "/design-method"
  to = "/design-method.html"
  status = 200

[[redirects]]
  from = "/signature-lifting"
  to = "/signature-lifting.html"
  status = 200

[[redirects]]
  from = "/structural-reset"
  to = "/structural-reset.html"
  status = 200

[[redirects]]
  from = "/collagen-builder"
  to = "/collagen-builder.html"
  status = 200

[[redirects]]
  from = "/filler-chamaka-se"
  to = "/filler-chamaka-se.html"
  status = 200

[[redirects]]
  from = "/ja/*"
  to = "/ja/:splat.html"
  status = 200

[[redirects]]
  from = "/zh/*"
  to = "/zh/:splat.html"
  status = 200

[[redirects]]
  from = "/th/*"
  to = "/th/:splat.html"
  status = 200
