# Korean site was retired in Phase 3 — preserve any inbound search /
# bookmark traffic by sending it to the English equivalent. The
# Eleventy build no longer outputs the full /ko/* tree (only
# /ko/booking.html and /ko/booking-manage.html ship for Korean patients).
# These wildcard redirects catch the legacy URLs. They are NOT forced,
# so Netlify falls back to serving the actual file when one exists,
# meaning /ko/booking and /ko/booking-manage continue to render normally.
[[redirects]]
  from = "/ko"
  to = "/"
  status = 301

[[redirects]]
  from = "/ko/blog"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/ko/blog/*"
  to = "/blog/:splat"
  status = 301

[[redirects]]
  from = "/ko/*"
  to = "/:splat"
  status = 301
