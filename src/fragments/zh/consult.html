<section class="bg-slate-950 text-white py-16 md:py-24">
  <div class="max-w-3xl mx-auto px-6 text-center">
    <span class="text-gold uppercase tracking-[0.22em] text-[10px] font-bold">医师直接沟通</span>
    <h1 class="text-4xl md:text-5xl font-serif mt-5">开始您的咨询</h1>
    <p class="text-slate-300 leading-relaxed mt-5 max-w-2xl mx-auto">告诉我们您感兴趣的治疗项目，我们将为您提供初步评估。附上照片有助于医师提供更准确的建议。</p>
  </div>
</section>

<section class="py-14 md:py-20 bg-slate-50">
  <div class="max-w-2xl mx-auto px-6">

    <form id="consultation-form" class="space-y-8">
      <div style="position:absolute;left:-9999px" aria-hidden="true">
        <input type="text" name="website" id="cf-hp" tabindex="-1" autocomplete="off">
      </div>

      <div>
        <label for="cf-name" class="block text-sm font-bold text-slate-700 mb-2">姓名 <span class="text-red-500">*</span></label>
        <input type="text" id="cf-name" name="name" required placeholder="您的全名"
          class="w-full border border-slate-200 rounded-lg px-4 py-3.5 text-slate-800 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-gold/40 focus:border-gold transition bg-white">
      </div>

      <div class="grid md:grid-cols-2 gap-6">
        <div>
          <label for="cf-email" class="block text-sm font-bold text-slate-700 mb-2">电子邮件</label>
          <input type="email" id="cf-email" name="email" placeholder="you@example.com"
            class="w-full border border-slate-200 rounded-lg px-4 py-3.5 text-slate-800 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-gold/40 focus:border-gold transition bg-white">
        </div>
        <div>
          <label for="cf-phone" class="block text-sm font-bold text-slate-700 mb-2">电话 / 通讯ID</label>
          <input type="text" id="cf-phone" name="phone" placeholder="微信、WhatsApp 等"
            class="w-full border border-slate-200 rounded-lg px-4 py-3.5 text-slate-800 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-gold/40 focus:border-gold transition bg-white">
        </div>
      </div>

      <p id="cf-contact-error" class="hidden text-red-500 text-sm -mt-4">请至少提供电子邮件或电话号码。</p>

      <fieldset>
        <legend class="block text-sm font-bold text-slate-700 mb-3">感兴趣的治疗项目</legend>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
          <label class="flex items-center gap-2.5 px-4 py-3 rounded-lg border border-slate-200 bg-white cursor-pointer hover:border-gold/50 transition has-[:checked]:border-gold has-[:checked]:bg-gold/5">
            <input type="checkbox" name="treatment" value="lifting" class="accent-[#c9a55a] w-4 h-4"> <span class="text-sm text-slate-700">提升</span>
          </label>
          <label class="flex items-center gap-2.5 px-4 py-3 rounded-lg border border-slate-200 bg-white cursor-pointer hover:border-gold/50 transition has-[:checked]:border-gold has-[:checked]:bg-gold/5">
            <input type="checkbox" name="treatment" value="filler" class="accent-[#c9a55a] w-4 h-4"> <span class="text-sm text-slate-700">填充</span>
          </label>
          <label class="flex items-center gap-2.5 px-4 py-3 rounded-lg border border-slate-200 bg-white cursor-pointer hover:border-gold/50 transition has-[:checked]:border-gold has-[:checked]:bg-gold/5">
            <input type="checkbox" name="treatment" value="skin-booster" class="accent-[#c9a55a] w-4 h-4"> <span class="text-sm text-slate-700">水光针</span>
          </label>
          <label class="flex items-center gap-2.5 px-4 py-3 rounded-lg border border-slate-200 bg-white cursor-pointer hover:border-gold/50 transition has-[:checked]:border-gold has-[:checked]:bg-gold/5">
            <input type="checkbox" name="treatment" value="regenerative" class="accent-[#c9a55a] w-4 h-4"> <span class="text-sm text-slate-700">再生医疗</span>
          </label>
          <label class="flex items-center gap-2.5 px-4 py-3 rounded-lg border border-slate-200 bg-white cursor-pointer hover:border-gold/50 transition has-[:checked]:border-gold has-[:checked]:bg-gold/5">
            <input type="checkbox" name="treatment" value="body" class="accent-[#c9a55a] w-4 h-4"> <span class="text-sm text-slate-700">身体塑形</span>
          </label>
          <label class="flex items-center gap-2.5 px-4 py-3 rounded-lg border border-slate-200 bg-white cursor-pointer hover:border-gold/50 transition has-[:checked]:border-gold has-[:checked]:bg-gold/5">
            <input type="checkbox" name="treatment" value="other" class="accent-[#c9a55a] w-4 h-4"> <span class="text-sm text-slate-700">其他</span>
          </label>
        </div>
      </fieldset>

      <div>
        <label for="cf-message" class="block text-sm font-bold text-slate-700 mb-2">留言 <span class="text-slate-400 font-normal">(选填)</span></label>
        <textarea id="cf-message" name="message" rows="4" placeholder="描述您的目标、顾虑或出行日期..."
          class="w-full border border-slate-200 rounded-lg px-4 py-3.5 text-slate-800 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-gold/40 focus:border-gold transition bg-white resize-y"></textarea>
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">照片附件 <span class="text-slate-400 font-normal">(选填，最多3张)</span></label>
        <div id="cf-dropzone" class="border-2 border-dashed border-slate-200 rounded-lg p-8 text-center cursor-pointer hover:border-gold/50 transition bg-white">
          <i class="fas fa-cloud-upload-alt text-2xl text-slate-300 mb-2"></i>
          <p class="text-sm text-slate-500">将照片拖到此处或<span class="text-gold font-bold">点击浏览</span></p>
          <p class="text-xs text-slate-400 mt-1">JPEG或PNG格式，每张不超过5MB</p>
          <input type="file" id="cf-photos" name="photos" accept="image/jpeg,image/png" multiple class="hidden">
        </div>
        <div id="cf-preview" class="flex gap-3 mt-3 flex-wrap"></div>
      </div>

      <button type="submit" id="cf-submit"
        class="w-full bg-slate-900 text-white py-4 px-8 font-bold rounded-lg hover:bg-slate-800 transition text-lg flex items-center justify-center gap-2">
        <i class="fas fa-paper-plane"></i> 提交咨询请求
      </button>

      <p class="text-xs text-slate-400 text-center leading-relaxed">通常回复时间：营业时间内（周一至周六）。您的信息将被安全存储，仅用于咨询目的。</p>
    </form>

    <div id="cf-success" class="hidden text-center py-20">
      <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
        <i class="fas fa-check text-2xl"></i>
      </div>
      <h2 class="text-3xl font-serif text-slate-900">请求已收到</h2>
      <p class="text-slate-500 mt-4 max-w-md mx-auto leading-relaxed">感谢您的咨询。我们的团队将在营业时间内审核并回复您。</p>
      <a href="/zh/index.html" class="inline-block mt-8 text-gold font-bold hover:underline">返回首页</a>
    </div>

    <div id="cf-error" class="hidden text-center py-10">
      <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
        <i class="fas fa-exclamation-triangle text-2xl"></i>
      </div>
      <h2 class="text-2xl font-serif text-slate-900">出了点问题</h2>
      <p class="text-slate-500 mt-4">请重试或通过微信直接联系我们。</p>
    </div>

  </div>
</section>

<section class="py-12 bg-white border-t border-slate-100">
  <div class="max-w-2xl mx-auto px-6 text-center">
    <p class="text-sm text-slate-500 mb-4">想直接通过消息联系？</p>
    <a href="#wechat" class="inline-flex items-center gap-2 px-6 py-3 border border-slate-200 rounded-lg text-slate-700 font-bold text-sm hover:border-gold hover:text-gold transition">
      <i class="fab fa-weixin"></i> 微信咨询
    </a>
  </div>
</section>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  'https://jwlfffpyeczyyojcutcx.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3bGZmZnB5ZWN6eXlvamN1dGN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDkxMTUsImV4cCI6MjA4ODk4NTExNX0.3j1AvpMzzB67OOoO97WYeLBeyF9sZxSO2dCjTbznYvY'
);

const LOCALE = 'zh';
const MAX_PHOTOS = 3;
const MAX_SIZE = 5 * 1024 * 1024;

const form = document.getElementById('consultation-form');
const submitBtn = document.getElementById('cf-submit');
const successEl = document.getElementById('cf-success');
const errorEl = document.getElementById('cf-error');
const dropzone = document.getElementById('cf-dropzone');
const fileInput = document.getElementById('cf-photos');
const previewContainer = document.getElementById('cf-preview');
const contactError = document.getElementById('cf-contact-error');

let selectedFiles = [];

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('border-gold'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('border-gold'));
dropzone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.classList.remove('border-gold');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => handleFiles(fileInput.files));

function handleFiles(files) {
  for (const f of files) {
    if (selectedFiles.length >= MAX_PHOTOS) break;
    if (f.size > MAX_SIZE) { alert('文件过大（最大5MB）: ' + f.name); continue; }
    if (!['image/jpeg', 'image/png'].includes(f.type)) continue;
    selectedFiles.push(f);
  }
  renderPreviews();
}

function renderPreviews() {
  previewContainer.innerHTML = '';
  selectedFiles.forEach((f, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'relative w-20 h-20 rounded-lg overflow-hidden border border-slate-200';
    const img = document.createElement('img');
    img.src = URL.createObjectURL(f);
    img.className = 'w-full h-full object-cover';
    const rm = document.createElement('button');
    rm.type = 'button';
    rm.className = 'absolute top-0.5 right-0.5 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center';
    rm.innerHTML = '&times;';
    rm.onclick = () => { selectedFiles.splice(i, 1); renderPreviews(); };
    wrap.append(img, rm);
    previewContainer.appendChild(wrap);
  });
  if (selectedFiles.length >= MAX_PHOTOS) dropzone.classList.add('opacity-50', 'pointer-events-none');
  else dropzone.classList.remove('opacity-50', 'pointer-events-none');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  if (form.website && form.website.value) return;
  const name = form.name.value.trim();
  const email = form.email.value.trim();
  const phone = form.phone.value.trim();

  if (!email && !phone) {
    contactError.classList.remove('hidden');
    return;
  }
  contactError.classList.add('hidden');

  const treatments = [...form.querySelectorAll('input[name="treatment"]:checked')].map(c => c.value);
  const message = form.message.value.trim();

  submitBtn.disabled = true;
  submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 提交中...';

  try {
    let photoUrls = [];
    for (const file of selectedFiles) {
      const ext = file.name.split('.').pop();
      const filePath = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
      const { error: upErr } = await supabase.storage.from('consultation-photos').upload(filePath, file);
      if (!upErr) photoUrls.push(filePath);
    }

    const { error } = await supabase.from('consultations').insert({
      name,
      email: email || null,
      phone: phone || null,
      locale: LOCALE,
      treatment_interest: treatments,
      message: message || null,
      photo_urls: photoUrls.length ? photoUrls : null,
    });

    if (error) throw error;

    try {
      await fetch('https://api.emailjs.com/api/v1.0/email/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          service_id: 'service_ti6j44a',
          template_id: 'template_xntg0qr',
          user_id: 'Dd3vrn1gR_VkvfrAK',
          template_params: {
            name, email: email || '—', phone: phone || '—',
            locale: LOCALE.toUpperCase(),
            treatments: treatments.join(', ') || 'None selected',
            message: message || '—',
            photo_count: photoUrls.length,
          }
        })
      });
    } catch (_) {}

    form.classList.add('hidden');
    successEl.classList.remove('hidden');
  } catch (err) {
    console.error(err);
    form.classList.add('hidden');
    errorEl.classList.remove('hidden');
  }
});
</script>
